<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#0a0e1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cape City">
<meta name="description" content="Cape City — an idle superhero game. Fight crime, recruit a team, master powers, defeat villains, and become a legend.">
<title>Cape City — Idle Hero</title>
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="16x16" href="icons/favicon-16.png">
<link rel="manifest" href="manifest.webmanifest">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --ink:#0a0e1a; --surface:#111a30; --surface2:#0d1424; --raised:#172340;
  --line:#26334f; --line2:#1b2640;
  --text:#eaf0ff; --muted:#90a2c6; --dim:#5e6f93;
  --blue:#4cc2ff; --blue2:#2b6fff; --gold:#ffc83d; --gold2:#ff9d12;
  --red:#ff4d5e; --aqua:#46e5b7; --violet:#9b6bff;
  --rank:#8ea3c8;
  --display:'Bangers', system-ui, sans-serif;
  --body:'Inter', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
  --r:16px; --hud-h:84px; --tab-h:64px;
  --safe-t:env(safe-area-inset-top,0px); --safe-b:env(safe-area-inset-bottom,0px);
}
html,body{height:100%;overflow:hidden;background:var(--ink);color:var(--text);font-family:var(--body);overscroll-behavior:none}
body{position:fixed;inset:0;width:100%;font-variant-numeric:tabular-nums;-webkit-font-smoothing:antialiased}
#app{position:absolute;inset:0;display:flex;flex-direction:column}
button{font-family:inherit;color:inherit;border:none;background:none;cursor:pointer}
.tnum{font-variant-numeric:tabular-nums;font-feature-settings:"tnum"}

/* ---------- atmosphere ---------- */
.sky{position:absolute;inset:0;z-index:0;pointer-events:none;
  background:
   radial-gradient(120% 80% at 50% -10%, #1a2banner 0%, transparent 60%),
   radial-gradient(90% 55% at 80% 0%, rgba(43,111,255,.16), transparent 60%),
   radial-gradient(90% 55% at 15% 5%, rgba(155,107,255,.12), transparent 55%),
   linear-gradient(180deg,#0c1428 0%, #0a0e1a 60%, #080b14 100%);}
.halftone{position:absolute;inset:0;z-index:0;pointer-events:none;opacity:.5;
  background-image:radial-gradient(rgba(255,255,255,.045) 1px, transparent 1.4px);
  background-size:13px 13px; mask-image:linear-gradient(180deg,#000,transparent 70%);
  -webkit-mask-image:linear-gradient(180deg,#000,transparent 70%);}
.stars{position:absolute;inset:0;z-index:0;pointer-events:none}
.stars i{position:absolute;width:2px;height:2px;border-radius:50%;background:#cfe0ff;opacity:.5;animation:tw 3.5s ease-in-out infinite}
@keyframes tw{0%,100%{opacity:.18}50%{opacity:.7}}
.skyline{position:absolute;left:0;right:0;bottom:0;z-index:0;width:100%;height:170px;pointer-events:none;opacity:.9}

/* ---------- HUD ---------- */
#hud{position:relative;z-index:5;flex:0 0 auto;
  padding:calc(var(--safe-t) + 8px) 12px 10px;display:flex;align-items:center;gap:10px;
  background:linear-gradient(180deg, rgba(10,14,26,.92), rgba(10,14,26,.55) 70%, transparent);
  backdrop-filter:blur(6px)}
.hicon{width:42px;height:42px;border-radius:12px;background:var(--surface);border:1px solid var(--line);
  font-size:19px;display:grid;place-items:center;flex:0 0 auto;position:relative;transition:transform .12s, background .2s}
.hicon:active{transform:scale(.9)}
.hicon .dot{position:absolute;top:-3px;right:-3px;width:11px;height:11px;border-radius:50%;background:var(--red);
  border:2px solid var(--ink);animation:pulse 1.2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.35)}}
.hud-main{flex:1;min-width:0;display:flex;flex-direction:column;align-items:center;gap:2px}
.rankrow{display:flex;align-items:center;gap:7px;max-width:100%}
.rank-emblem{font-size:16px;filter:drop-shadow(0 1px 2px rgba(0,0,0,.6))}
.rank-title{font-size:12.5px;font-weight:800;color:var(--rank);letter-spacing:.3px;text-transform:uppercase;white-space:nowrap}
.hero-name{font-size:11px;color:var(--muted);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hero-name b{color:var(--text);font-weight:600}
.valor{font-family:var(--body);font-weight:900;font-size:32px;line-height:1.05;letter-spacing:-.5px;
  color:#fff;text-shadow:0 0 18px rgba(255,200,61,.25)}
.valor .u{color:var(--gold);font-size:.62em;font-weight:800;margin-left:1px}
.vps{font-size:12.5px;color:var(--gold);font-weight:700;margin-top:-1px}
.vps b{color:var(--text)}

/* ---------- panels ---------- */
#panels{position:relative;z-index:4;flex:1 1 auto;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;
  padding:6px 12px 20px}
.panel{display:none;animation:fade .25s ease}
.panel.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.phead{display:flex;align-items:baseline;justify-content:space-between;margin:4px 2px 10px}
.ptitle{font-family:var(--display);font-size:25px;letter-spacing:.5px;color:var(--text)}
.psub{font-size:11.5px;color:var(--dim);font-weight:600}

/* card / list */
.card{background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--line);
  border-radius:var(--r);padding:13px}
.row{display:flex;align-items:center;gap:12px;width:100%;text-align:left;
  background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--line);
  border-radius:14px;padding:11px 12px;margin-bottom:9px;position:relative;overflow:hidden;
  transition:transform .1s, border-color .2s, opacity .2s}
.row:active{transform:scale(.985)}
.row.afford{border-color:#3a567f}
.row.locked{opacity:.55;filter:saturate(.5)}
.row .ico{width:46px;height:46px;border-radius:12px;flex:0 0 auto;display:grid;place-items:center;font-size:24px;
  background:radial-gradient(120% 120% at 30% 20%, #20305a, #131d35);border:1px solid var(--line)}
.row .mid{flex:1;min-width:0}
.row .nm{font-weight:700;font-size:14.5px;display:flex;align-items:center;gap:6px}
.row .ds{font-size:11.5px;color:var(--muted);margin-top:2px;line-height:1.35}
.row .rt{font-size:11px;color:var(--gold);font-weight:700;margin-top:3px}
.row .rt b{color:var(--text)}
.row .end{flex:0 0 auto;text-align:right;display:flex;flex-direction:column;align-items:flex-end;gap:4px;min-width:74px}
.cost{font-weight:800;font-size:13.5px;color:var(--gold)}
.cost.no{color:var(--dim)}
.cnt{font-family:var(--display);font-size:21px;color:#fff;line-height:.9;letter-spacing:.5px}
.tag{font-size:9.5px;font-weight:800;letter-spacing:.4px;text-transform:uppercase;color:var(--dim)}
.lockmsg{font-size:10.5px;color:var(--dim);font-weight:700}
.sweep{position:absolute;inset:0;border-radius:14px;pointer-events:none;opacity:0;
  background:linear-gradient(120deg,transparent 30%, rgba(255,200,61,.18), transparent 70%)}
.row.flash .sweep{animation:sweep .5s ease}
@keyframes sweep{0%{opacity:0;transform:translateX(-40%)}40%{opacity:1}100%{opacity:0;transform:translateX(40%)}}
.sectlbl{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--dim);
  margin:14px 4px 9px;display:flex;align-items:center;gap:8px}
.sectlbl:before,.sectlbl:after{content:"";height:1px;background:var(--line2);flex:1}
.empty{text-align:center;color:var(--dim);font-size:12.5px;padding:26px 16px;font-weight:600}

/* buy amount toggle */
.buytog{display:flex;gap:6px;background:var(--surface2);border:1px solid var(--line);border-radius:11px;padding:3px}
.buytog button{flex:1;padding:6px 0;font-size:12px;font-weight:800;border-radius:8px;color:var(--muted)}
.buytog button.on{background:linear-gradient(180deg,var(--blue),var(--blue2));color:#04122b;box-shadow:0 2px 10px rgba(60,160,255,.3)}

/* ---------- City: medallion ---------- */
.citywrap{display:flex;flex-direction:column;align-items:center;gap:14px;padding-top:6px}
.medwrap{position:relative;width:230px;height:230px;display:grid;place-items:center;margin-top:4px;touch-action:manipulation}
.med-ring{position:absolute;inset:0;border-radius:50%;
  background:conic-gradient(from 0deg, var(--blue),var(--violet),var(--gold),var(--blue));
  filter:blur(2px);opacity:.55;animation:spin 9s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.med-glow{position:absolute;inset:14px;border-radius:50%;background:radial-gradient(circle,rgba(76,194,255,.28),transparent 65%);animation:breathe 3.4s ease-in-out infinite}
@keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.07);opacity:1}}
.med{position:relative;width:182px;height:182px;border-radius:50%;border:none;
  background:radial-gradient(130% 130% at 32% 22%, #1c2c52, #0e1830 70%);
  box-shadow:0 14px 34px rgba(0,0,0,.5), inset 0 2px 0 rgba(255,255,255,.06), inset 0 -10px 30px rgba(0,0,0,.45);
  display:grid;place-items:center;transition:transform .07s}
.med:active{transform:scale(.94)}
.med.punch{animation:punch .18s ease}
@keyframes punch{0%{transform:scale(.9)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.med .em{font-size:74px;filter:drop-shadow(0 4px 10px rgba(0,0,0,.5))}
.med .cap{position:absolute;bottom:24px;font-family:var(--display);font-size:15px;letter-spacing:1px;color:var(--gold);text-shadow:0 1px 4px rgba(0,0,0,.6)}
.tap-hint{font-size:12px;color:var(--muted);font-weight:600}
.tap-hint b{color:var(--gold)}
.float{position:absolute;left:50%;top:42%;transform:translateX(-50%);font-family:var(--display);
  font-size:24px;color:var(--gold);text-shadow:0 2px 6px rgba(0,0,0,.6);pointer-events:none;
  animation:floatup 1s ease-out forwards;z-index:3;white-space:nowrap}
@keyframes floatup{0%{opacity:0;transform:translate(-50%,0) scale(.6)}15%{opacity:1}100%{opacity:0;transform:translate(-50%,-74px) scale(1.05)}}

.statline{display:flex;gap:9px;width:100%;max-width:380px}
.stat{flex:1;background:linear-gradient(180deg,var(--surface),var(--surface2));border:1px solid var(--line);
  border-radius:13px;padding:10px 8px;text-align:center}
.stat .k{font-size:10px;color:var(--dim);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.stat .v{font-size:15px;font-weight:800;margin-top:3px}
.stat .v.gold{color:var(--gold)} .stat .v.blue{color:var(--blue)}

/* crime ticker */
.ticker{width:100%;max-width:380px;background:rgba(13,20,36,.7);border:1px solid var(--line2);border-radius:12px;
  padding:9px 12px;min-height:40px}
.ticker .t-lbl{font-size:9.5px;font-weight:800;letter-spacing:1px;color:var(--red);text-transform:uppercase;margin-bottom:3px}
.ticker .t-line{font-size:12px;color:var(--muted);animation:fade .3s ease}
.ticker .t-line b{color:var(--text)}

/* active threat banner (city) */
.threatbar{width:100%;max-width:380px;border-radius:13px;padding:11px 13px;display:flex;align-items:center;gap:11px;
  background:linear-gradient(180deg,rgba(70,18,28,.7),rgba(40,12,20,.6));border:1px solid #5a2230}
.threatbar .em{font-size:28px}
.threatbar .mid{flex:1;min-width:0}
.threatbar .nm{font-weight:800;font-size:13.5px;color:#ffd0d6}
.threatbar .hpbar{height:7px;border-radius:5px;background:#2a1420;overflow:hidden;margin-top:5px}
.threatbar .hpfill{height:100%;background:linear-gradient(90deg,var(--red),#ff8a96);transition:width .15s}
.threatbar .go{font-size:11px;font-weight:800;color:#ffd0d6;background:rgba(255,77,94,.18);
  border:1px solid #6a2a38;border-radius:9px;padding:7px 10px}

/* ---------- Abilities ---------- */
.abil{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.ab{position:relative;overflow:hidden;background:linear-gradient(180deg,var(--surface),var(--surface2));
  border:1px solid var(--line);border-radius:14px;padding:11px;text-align:left}
.ab.ready{border-color:var(--violet);box-shadow:0 0 0 1px rgba(155,107,255,.25), 0 6px 16px rgba(155,107,255,.12)}
.ab.active{border-color:var(--gold);box-shadow:0 0 0 1px rgba(255,200,61,.3)}
.ab .ab-top{display:flex;align-items:center;gap:8px}
.ab .ab-em{font-size:22px}
.ab .ab-nm{font-weight:800;font-size:13px}
.ab .ab-ds{font-size:10.5px;color:var(--muted);margin-top:6px;line-height:1.3;min-height:27px}
.ab .ab-st{margin-top:7px;font-size:11px;font-weight:800}
.ab .ab-st.r{color:var(--violet)} .ab .ab-st.a{color:var(--gold)} .ab .ab-st.c{color:var(--dim)}
.ab .cdfill{position:absolute;left:0;bottom:0;height:3px;background:var(--violet);width:0}

/* ---------- Threats panel ---------- */
.boss{display:flex;flex-direction:column;align-items:center;text-align:center;gap:8px;padding:18px 14px 16px}
.boss .bem{font-size:72px;filter:drop-shadow(0 6px 14px rgba(255,77,94,.3));animation:hover 3s ease-in-out infinite}
@keyframes hover{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
.boss .bnm{font-family:var(--display);font-size:28px;letter-spacing:.5px;color:#ffd0d6}
.boss .bkind{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:1px}
.boss .bkind.major{color:var(--gold)} .boss .bkind.minor{color:var(--muted)}
.boss .bstory{font-size:12.5px;color:var(--muted);max-width:300px;line-height:1.45;font-style:italic}
.bhp{width:100%;max-width:320px;height:16px;border-radius:9px;background:#2a1420;overflow:hidden;position:relative;border:1px solid #4a2030}
.bhpfill{height:100%;background:linear-gradient(90deg,#ff3344,#ff8a96);transition:width .12s}
.bhptxt{position:absolute;inset:0;display:grid;place-items:center;font-size:11px;font-weight:800;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.6)}
.strike{width:100%;max-width:320px;margin-top:6px;padding:16px;border-radius:15px;font-family:var(--display);
  font-size:24px;letter-spacing:1.5px;color:#3a0810;
  background:linear-gradient(180deg,#ff8a96,var(--red));box-shadow:0 8px 22px rgba(255,77,94,.35), inset 0 2px 0 rgba(255,255,255,.3);
  transition:transform .07s}
.strike:active{transform:scale(.96)}
.brew{font-size:12px;color:var(--gold);font-weight:700}.brew b{color:var(--text)}
.dps{font-size:11px;color:var(--muted)}.dps b{color:var(--blue)}

/* ---------- Legacy ---------- */
.legacy-hero{text-align:center;padding:14px 12px 6px}
.legacy-hero .lem{font-size:46px}
.legacy-hero .lt{font-family:var(--display);font-size:26px;color:var(--aqua);letter-spacing:.5px;margin-top:2px}
.legacy-hero .lhave{font-size:13px;color:var(--muted);margin-top:4px}
.legacy-hero .lhave b{color:var(--aqua);font-weight:800}
.prestige-btn{width:100%;margin-top:12px;padding:15px;border-radius:15px;font-family:var(--display);font-size:21px;letter-spacing:1px;
  color:#042018;background:linear-gradient(180deg,#6ff0c8,var(--aqua));box-shadow:0 8px 22px rgba(70,229,183,.3), inset 0 2px 0 rgba(255,255,255,.35);
  transition:transform .1s, filter .2s}
.prestige-btn:active{transform:scale(.97)}
.prestige-btn.dis{filter:grayscale(.8) brightness(.7);}
.prestige-sub{font-size:11.5px;color:var(--dim);text-align:center;margin-top:7px;font-weight:600}
.sk{display:grid;grid-template-columns:1fr;gap:9px}
.sknode{display:flex;align-items:center;gap:11px;background:linear-gradient(180deg,var(--surface),var(--surface2));
  border:1px solid var(--line);border-radius:13px;padding:11px;transition:border-color .2s,opacity .2s}
.sknode.have{border-color:var(--aqua);background:linear-gradient(180deg,rgba(70,229,183,.08),var(--surface2))}
.sknode.afford{border-color:#2f6f63}
.sknode.lock{opacity:.5}
.sknode .se{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;font-size:21px;flex:0 0 auto;
  background:radial-gradient(120% 120% at 30% 20%, #143a33, #0e1d28);border:1px solid var(--line)}
.sknode .smid{flex:1;min-width:0}.sknode .snm{font-weight:800;font-size:13.5px}
.sknode .sds{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.3}
.sknode .scost{font-size:13px;font-weight:800;color:var(--aqua);flex:0 0 auto}
.sknode .scost.owned{color:var(--aqua)}.sknode .scost.no{color:var(--dim)}

/* ---------- tab bar ---------- */
#tabs{position:relative;z-index:6;flex:0 0 auto;display:flex;
  padding:6px 8px calc(var(--safe-b) + 6px);gap:4px;
  background:linear-gradient(0deg, rgba(10,14,26,.96), rgba(10,14,26,.7));border-top:1px solid var(--line2);backdrop-filter:blur(8px)}
.tab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:7px 2px 5px;border-radius:12px;
  color:var(--dim);position:relative;transition:color .2s, background .2s, transform .1s}
.tab .ti{font-size:21px;line-height:1;transition:transform .15s}
.tab .tl{font-size:9.5px;font-weight:800;letter-spacing:.3px;text-transform:uppercase}
.tab.on{color:var(--text)}
.tab.on .ti{transform:translateY(-1px) scale(1.08)}
.tab.on:after{content:"";position:absolute;top:3px;left:50%;transform:translateX(-50%);width:26px;height:3px;border-radius:3px;
  background:var(--rank);box-shadow:0 0 10px var(--rank)}
.tab:active{transform:scale(.92)}
.tab.locked{color:#384a6b;pointer-events:none}
.tab .lk{position:absolute;top:4px;right:calc(50% - 22px);font-size:10px;opacity:.8}
.tab .nd{position:absolute;top:4px;right:calc(50% - 20px);width:9px;height:9px;border-radius:50%;background:var(--red);border:2px solid var(--ink);animation:pulse 1.2s infinite}
.tab.justunlocked{animation:popin .5s ease}
@keyframes popin{0%{transform:scale(.4);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1)}}

/* ---------- toasts ---------- */
#toasts{position:absolute;left:0;right:0;top:calc(var(--safe-t) + var(--hud-h));z-index:30;
  display:flex;flex-direction:column;align-items:center;gap:7px;pointer-events:none;padding:0 16px}
.toast{max-width:340px;background:linear-gradient(180deg,#172340,#101a30);border:1px solid var(--line);
  border-left:4px solid var(--gold);border-radius:12px;padding:10px 14px;box-shadow:0 10px 30px rgba(0,0,0,.5);
  animation:toastin .35s ease, toastout .4s ease 3.2s forwards}
.toast.unlock{border-left-color:var(--blue)} .toast.win{border-left-color:var(--aqua)} .toast.warn{border-left-color:var(--red)}
.toast .tt{font-weight:800;font-size:13px;display:flex;align-items:center;gap:7px}
.toast .tb{font-size:11.5px;color:var(--muted);margin-top:2px}
@keyframes toastin{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
@keyframes toastout{to{opacity:0;transform:translateY(-10px)}}

/* ---------- comic burst (boss defeat) ---------- */
#burst{position:absolute;inset:0;z-index:40;display:none;place-items:center;pointer-events:none}
#burst.show{display:grid;animation:fade .2s ease}
.burst-word{font-family:var(--display);font-size:84px;color:var(--gold);
  text-shadow:5px 5px 0 var(--red), -2px -2px 0 #fff, 0 0 30px rgba(255,200,61,.6);
  transform:rotate(-9deg);animation:bursthit .7s cubic-bezier(.2,1.4,.4,1)}
@keyframes bursthit{0%{transform:rotate(-9deg) scale(.2);opacity:0}40%{opacity:1}70%{transform:rotate(-9deg) scale(1.15)}100%{transform:rotate(-9deg) scale(1);opacity:0}}
.spark{position:absolute;width:8px;height:8px;border-radius:2px;background:var(--gold)}

/* ---------- modal ---------- */
#modalHost{position:absolute;inset:0;z-index:50;display:none}
#modalHost.show{display:block}
.scrim{position:absolute;inset:0;background:rgba(5,8,16,.7);backdrop-filter:blur(3px);animation:fade .2s ease;
  display:grid;place-items:center;padding:20px}
.modal{width:100%;max-width:380px;max-height:84vh;overflow-y:auto;background:linear-gradient(180deg,#13203c,#0d1426);
  border:1px solid var(--line);border-radius:20px;box-shadow:0 24px 60px rgba(0,0,0,.6);animation:modalin .28s cubic-bezier(.2,1.2,.3,1)}
@keyframes modalin{from{opacity:0;transform:translateY(20px) scale(.96)}to{opacity:1;transform:none}}
.mhead{padding:18px 18px 10px;text-align:center}
.mhead .me{font-size:40px}
.mhead .mt{font-family:var(--display);font-size:24px;letter-spacing:.5px;margin-top:4px}

.btn{flex:1;padding:13px;border-radius:13px;font-weight:800;font-size:14px;text-align:center;transition:transform .1s, filter .2s}
.btn:active{transform:scale(.97)}

.btn.go{background:linear-gradient(180deg,#6ff0c8,var(--aqua));color:#042018}

.btn.ghost{background:var(--surface);border:1px solid var(--line);color:var(--text)}

/* origin chooser */
.origins{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:6px 18px 4px}
.orig{background:var(--surface);border:1px solid var(--line);border-radius:14px;padding:13px 11px;text-align:center;transition:border-color .15s,transform .1s}
.orig:active{transform:scale(.96)}
.orig.sel{border-color:var(--blue);box-shadow:0 0 0 1px rgba(76,194,255,.4)}
.orig .oe{font-size:32px}
.orig .on{font-weight:800;font-size:14px;margin-top:5px}
.orig .of{font-size:10.5px;color:var(--gold);font-weight:700;margin-top:4px;line-height:1.3}
.namein{width:100%;background:var(--surface2);border:1px solid var(--line);border-radius:12px;padding:12px;
  color:var(--text);font-family:inherit;font-size:14px;font-weight:600;text-align:center;margin:2px 0 2px}
.namein:focus{outline:none;border-color:var(--blue)}

/* settings rows */
.setrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 4px;border-bottom:1px solid var(--line2)}
.setrow:last-child{border-bottom:none}
.setrow .sk{font-weight:700;font-size:13.5px}.setrow .sv{font-size:11px;color:var(--dim);margin-top:2px}
.toggle{width:46px;height:27px;border-radius:14px;background:var(--surface);border:1px solid var(--line);position:relative;flex:0 0 auto}
.toggle.on{background:linear-gradient(90deg,var(--blue2),var(--blue))}
.toggle i{position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .18s}
.toggle.on i{left:21px}
.minibtn{padding:8px 12px;border-radius:10px;background:var(--surface);border:1px solid var(--line);font-weight:700;font-size:12px}
.minibtn.danger{color:var(--red);border-color:#4a2030}

.ach{aspect-ratio:1;border-radius:12px;display:grid;place-items:center;text-align:center;gap:2px;

const SUF=['','K','M','B','T','Qa','Qi','Sx','Sp','Oc','No','Dc','UD','DD','TD','QaD','QiD','SxD','SpD','OcD','NoD','Vg'];
function fmt(n){
  n = n||0;
  if(!isFinite(n)) return '∞';
  if(n<0) return '-'+fmt(-n);
  if(n<1000){ return (n>=100||Number.isInteger(n)) ? String(Math.floor(n)) : (Math.round(n*10)/10).toString(); }
  let t=Math.floor(Math.log10(n)/3);
  let m=n/Math.pow(1000,t);
  if(t>=SUF.length){ return n.toExponential(2).replace('e+','e'); }
  let s = m>=100? m.toFixed(0) : m>=10? m.toFixed(1) : m.toFixed(2);
  return s+SUF[t];
}
function fmtTime(sec){
  sec=Math.max(0,Math.floor(sec));
  if(sec<60) return sec+'s';
  if(sec<3600) return Math.floor(sec/60)+'m '+(sec%60)+'s';
  if(sec<86400) return Math.floor(sec/3600)+'h '+Math.floor((sec%3600)/60)+'m';

  {id:'a_pres1',  emoji:'♻️', name:'New Generation',cond:s=>s.prestiges>=1},
  {id:'a_pres5',  emoji:'🔄', name:'Mentor',        cond:s=>s.prestiges>=5},
  {id:'a_pres25', emoji:'🌀', name:'Eternal',       cond:s=>s.prestiges>=25},
  {id:'a_legend10',emoji:'⭐',name:'Storied',       cond:s=>s.legend>=10},
  {id:'a_legend100',emoji:'✨',name:'Mythmaker',    cond:s=>s.legend>=100},
  {id:'a_allglobal',emoji:'🎆',name:'Full Support', cond:s=>UPGRADES.filter(u=>u.type==='global').every(u=>s.ups[u.id])},
  {id:'a_skill5', emoji:'🧠', name:'Master',        cond:s=>SKILLS.filter(k=>s.ups[k.id]).length>=5},

const CRIMES=['Mugging','Carjacking','Bank alarm','Purse snatch','Arson attempt','Hostage scare','Jewel heist',
  'Hit-and-run','Smash-and-grab','Subway brawl','Rooftop chase','Bomb threat','Kidnapping','Cat stuck in tree'];
const STREETS=['5th & Vine','Dockside','Old Town','Neon Plaza','Harbor Row','West End','Steel Bridge','Granite Park',
  'Midtown','The Heights','Cobalt St.','Aurora Ave.','Riverside','Lowtown'];

/* ---------------- state ---------------- */
let S=null;
function defaultState(){
  return {
    v:0, earned:0, lifetime:0, clicks:0,
    gens:{}, ups:{}, pow:{}, powActive:{},
    legend:0, prestiges:0, villains:0, storyIndex:0,
    threat:null, threatCD:18, permaBonus:0,
    ach:{}, origin:null, name:'', buyAmt:1,
    muted:false, reduceFx:false,
    t:now(), created:now(),
    _usedPower:false, _seenTabs:{},
  };
}
function save(){
  try{ S.t=now(); localStorage.setItem(SAVEKEY, btoa(unescape(encodeURIComponent(JSON.stringify(S))))); }catch(e){}
}
function rawLoad(){
  try{
    const r=localStorage.getItem(SAVEKEY); if(!r) return null;
    let txt; try{ txt=decodeURIComponent(escape(atob(r))); }catch(e){ txt=r; }
    return JSON.parse(txt);
  }catch(e){ return null; }
}
function load(){
  const d=rawLoad();
  S=defaultState();
  if(d && typeof d==='object'){ Object.assign(S, d);
    S.gens=d.gens||{}; S.ups=d.ups||{}; S.pow=d.pow||{}; S.powActive=d.powActive||{}; S.ach=d.ach||{}; S._seenTabs=d._seenTabs||{};
  }
  return !!d;
}

/* ---------------- derived / calc ---------------- */
const GMAP={}; GENS.forEach(g=>GMAP[g.id]=g);
const UMAP={}; UPGRADES.forEach(u=>UMAP[u.id]=u);
const PMAP={}; POWERS.forEach(p=>PMAP[p.id]=p);
const SKMAP={}; SKILLS.forEach(k=>SKMAP[k.id]=k);

function teamSize(){ let n=0; for(const g of GENS) n+=(S.gens[g.id]||0); return n; }
function skillVal(type,base){ let v=base; for(const k of SKILLS){ if(k.type===type && S.ups[k.id]) v*= (k.val!==undefined?k.val:1); } return v; }
function hasFlag(id){ return !!S.ups[id]; }

function rankIdx(){ let i=0; for(let r=0;r<RANKS.length;r++){ if(S.lifetime>=RANKS[r].t) i=r; } return i; }
function curRank(){ return RANKS[rankIdx()]; }
function nextRank(){ const i=rankIdx(); return i+1<RANKS.length? RANKS[i+1]:null; }

function achCount(){ let n=0; for(const k in S.ach) if(S.ach[k]) n++; return n; }

function costMult(){
  let m=1;
  if(S.origin==='mind') m*=0.85;
  m*=skillVal('cost',1);
  return m;
}
function genTierMult(id){
  let m=1;
  for(const t of GEN_TIERS){ if(S.ups[id+'_t'+t]) m*=2; }
  return m;
}
function globalMult(){
  let m=1;
  for(const u of UPGRADES){ if(u.type==='global' && S.ups[u.id]) m*=u.mult; }
  m*= 1 + rankIdx()*0.05;            // rank bonus
  m*= 1 + S.legend*0.03;             // legend bonus
  m*= 1 + achCount()*0.01;           // achievements
  m*= 1 + (S.permaBonus||0);         // boss permanent bonuses
  if(S.origin==='speed') m*=1.4;
  m*=skillVal('prod',1);             // skill prod nodes
  // active abilities
  for(const id in S.powActive){
    if(S.powActive[id]>now()){
      const p=PMAP[id]; if(!p) continue;
      if(p.kind==='prodmult') m*=p.mult;
      if(p.kind==='rally') m*=p.prodMult;
    }
  }
  return m;
}
function baseProduction(){ // before global mult
  let p=0;
  for(const g of GENS){ const c=S.gens[g.id]||0; if(c) p+= c*g.rate*genTierMult(g.id); }
  return p;
}
function production(){ return baseProduction()*globalMult(); }

function clickMultBase(){
  let m=1;
  if(S.origin==='power') m*=2.5;
  for(const u of UPGRADES){ if(u.type==='click' && S.ups[u.id]) m*=u.mult; }
  m*=skillVal('clickmult',1);
  for(const id in S.powActive){ if(S.powActive[id]>now()){ const p=PMAP[id]; if(p&&p.kind==='rally') m*=p.clickMult; } }
  return m;
}
function clickPct(){ let v=0; for(const u of UPGRADES){ if(u.type==='clickpct' && S.ups[u.id]) v+=u.val; } return v; }
function clickPower(){
  const prod=production();
  let cp = 1*clickMultBase() + clickPct()*prod;
  cp = Math.max(cp, prod*0.02);   // a tap is always worth ≥2% of a second
  return cp;
}
function strikeMult(){ return hasFlag('sk_threat1')?1.5:1; }
function threatRewardMult(){ return hasFlag('sk_threat1')?2:1; }
function legendMult(){ let m=1; if(S.origin==='cosmic') m*=1.2; m*=skillVal('legend',1); return m; }
function offlineCapHours(){ let h=4; if(S.origin==='cosmic') h+=3; for(const k of SKILLS){ if(k.type==='offline'&&S.ups[k.id]) h+=k.val; } return h; }
function cdMult(){ return skillVal('cd',1); }

function genCostTotal(g,owned,amt){
  const base=g.cost*costMult()*Math.pow(COST_GROWTH,owned);
  return base*(Math.pow(COST_GROWTH,amt)-1)/(COST_GROWTH-1);
}
function genMaxAffordable(g,owned,budget){
  const base=g.cost*costMult()*Math.pow(COST_GROWTH,owned);
  const rhs=1+budget*(COST_GROWTH-1)/base;
  if(rhs<=1) return 0;
  return Math.floor(Math.log(rhs)/Math.log(COST_GROWTH));
}
function buyAmtFor(g,owned){
  if(S.buyAmt===-1){ return Math.max(1, genMaxAffordable(g,owned,S.v)); }
  return S.buyAmt;
}

/* prestige */
function legendGain(){
  const base=Math.floor(Math.pow(Math.max(0,S.earned)/2.5e5, 0.5));
  return Math.max(0, Math.floor(base*legendMult()));
}
function canPrestige(){ return S.lifetime>=1e6; }

/* unlock thresholds for tabs */
const TAB_UNLOCK={ city:0, team:0, powers:300, threats:1500, legacy:1e6 };
function tabUnlocked(tab){ return S.lifetime>=(TAB_UNLOCK[tab]||0); }

/* ---------------- rendering ---------------- */
let curTab='city';
const el={};
function cacheEls(){
  el.valor=$('#valor'); el.vps=$('#vps'); el.rankTitle=$('#rankTitle'); el.rankEmblem=$('#rankEmblem'); el.heroName=$('#heroName');
  el.tapPow=$('#tapPow'); el.cityVps=$('#cityVps'); el.cityTap=$('#cityTap'); el.cityTeam=$('#cityTeam');

  el.threatBody=$('#threatBody'); el.threatSub=$('#threatSub'); el.legacyBody=$('#legacyBody'); el.cityThreat=$('#cityThreat');

/* HUD + city stats — cheap, runs every frame */
function renderHUD(){

/* generic: build a signature so we only rebuild list DOM when structure changes */
let sig={};
function changed(key,val){ if(sig[key]===val) return false; sig[key]=val; return true; }

/* TEAM list */
function buildTeamRows(){
  el.teamList.innerHTML='';
  let anyLocked=false, shown=0;
  for(let i=0;i<GENS.length;i++){
    const g=GENS[i];
    const unlocked = S.lifetime>=g.unlock || (S.gens[g.id]||0)>0;
    if(!unlocked){
      // show the very next locked one as a teaser, then stop
      const row=document.createElement('div'); row.className='row locked';
      row.innerHTML=`<div class="ico">❔</div><div class="mid"><div class="nm">??? </div>
        <div class="ds">A new ally awaits.</div></div>
        <div class="end"><div class="lockmsg">Unlocks at<br>${fmt(g.unlock)} earned</div></div>`;
      el.teamList.appendChild(row); anyLocked=true; break;
    }
    shown++;
    const row=document.createElement('div'); row.className='row'; row.dataset.gen=g.id;
    row.innerHTML=`<div class="sweep"></div>
      <div class="ico">${g.emoji}</div>
      <div class="mid">
        <div class="nm">${g.name}</div>
        <div class="rt">+<b class="rrate">0</b>/s each</div>
        <div class="ds rsub">producing <b class="rtot">0</b>/s</div>
      </div>
      <div class="end"><div class="cnt rcnt">0</div><div class="cost rcost">0</div></div>`;
    row.addEventListener('click',()=>buyGen(g.id,row));
    el.teamList.appendChild(row);
  }
  if(shown===0 && !anyLocked){ el.teamList.innerHTML='<div class="empty">No allies available yet.</div>'; }
}
function updateTeamRows(){
  el.teamSub.textContent = teamSize()+' recruited · '+fmt(production())+'/s';
  $$('#teamList .row[data-gen]').forEach(row=>{
    const g=GMAP[row.dataset.gen]; const owned=S.gens[g.id]||0;
    const amt=buyAmtFor(g,owned);
    const cost=genCostTotal(g,owned,Math.max(1,amt));
    const can=S.v>=cost && amt>0;
    row.classList.toggle('afford',can);
    row.querySelector('.rcnt').textContent=owned;
    row.querySelector('.rrate').textContent=fmt(g.rate*genTierMult(g.id)*globalMult());
    row.querySelector('.rtot').textContent=fmt(owned*g.rate*genTierMult(g.id)*globalMult());
    const cEl=row.querySelector('.rcost');
    const label=(S.buyAmt===-1?('x'+Math.max(1,amt)+' · '):(amt>1?('x'+amt+' · '):''))+fmt(cost);
    cEl.textContent=label; cEl.classList.toggle('no',!can);
  });
}

/* POWERS: abilities + upgrades */
function buildPowers(){
  // abilities
  const unlockedPows=POWERS.filter(p=>S.lifetime>=p.unlock);
  if(unlockedPows.length===0){
    el.abilWrap.innerHTML='<div class="card" style="margin-bottom:12px;text-align:center;color:var(--dim);font-size:12.5px">'+
      '🔒 Active abilities unlock as you grow. First at <b style="color:var(--violet)">'+fmt(POWERS[0].unlock)+'</b> Valor earned.</div>';
  } else {
    el.abilWrap.innerHTML='<div class="sectlbl">Abilities</div><div class="abil" id="abilGrid"></div>';
    const grid=$('#abilGrid');
    unlockedPows.forEach(p=>{
      const d=document.createElement('button'); d.className='ab'; d.dataset.pow=p.id;
      d.innerHTML=`<div class="cdfill"></div><div class="ab-top"><span class="ab-em">${p.emoji}</span><span class="ab-nm">${p.name}</span></div>
        <div class="ab-ds">${p.desc}</div><div class="ab-st"></div>`;
      d.addEventListener('click',()=>castPower(p.id));
      grid.appendChild(d);
    });
  }
  // upgrades (non-gentier visible always if unlocked-ish; gentier when threshold met)
  el.upgList.innerHTML='<div class="sectlbl">Upgrades</div>';
  const list=document.createElement('div'); list.id='upgInner'; el.upgList.appendChild(list);
}
function visibleUpgrades(){
  const out=[];
  for(const u of UPGRADES){
    if(S.ups[u.id]) continue; // bought
    if(u.type==='gentier'){
      const owned=S.gens[u.gen]||0;
      if(owned>=u.need) out.push(u);
    } else {
      // reveal once within reach (cost < 8x current best-ever earned, or affordable) — keep simple: reveal when lifetime>=cost/12
      if(S.lifetime>=u.cost/15 || S.v>=u.cost) out.push(u);
    }
  }
  // sort by cost asc
  out.sort((a,b)=>a.cost-b.cost);
  return out.slice(0,8);
}
let upgSig='';
function renderUpgrades(){
  const vis=visibleUpgrades();
  const s=vis.map(u=>u.id).join(',');
  const inner=$('#upgInner'); if(!inner) return;
  if(s!==upgSig){
    upgSig=s; inner.innerHTML='';
    if(vis.length===0){ inner.innerHTML='<div class="empty">All caught up. New upgrades appear as you progress.</div>'; }
    vis.forEach(u=>{
      const row=document.createElement('div'); row.className='row'; row.dataset.up=u.id;
      const tag=u.type==='click'||u.type==='clickpct'?'Tap':u.type==='global'?'Global':'Team';
      row.innerHTML=`<div class="sweep"></div><div class="ico">${u.emoji}</div>
        <div class="mid"><div class="nm">${u.name} <span class="tag">${tag}</span></div><div class="ds">${u.desc}</div></div>
        <div class="end"><div class="cost rcost">${fmt(u.cost)}</div></div>`;
      row.addEventListener('click',()=>buyUpgrade(u.id,row));
      inner.appendChild(row);
    });
  }
  // affordability
  $$('#upgInner .row[data-up]').forEach(row=>{
    const u=UMAP[row.dataset.up]; const can=S.v>=u.cost;
    row.classList.toggle('afford',can);
    row.querySelector('.rcost').classList.toggle('no',!can);
  });
}
function updateAbilities(){
  $$('.ab[data-pow]').forEach(d=>{
    const p=PMAP[d.dataset.pow]; const t=now();
    const activeUntil=S.powActive[p.id]||0; const ready=S.pow[p.id]||0;
    const st=d.querySelector('.ab-st'); const fill=d.querySelector('.cdfill');
    d.classList.remove('ready','active');
    if(activeUntil>t){
      d.classList.add('active'); st.className='ab-st a'; st.textContent='ACTIVE · '+Math.ceil((activeUntil-t)/1000)+'s';
      fill.style.width='100%'; fill.style.background='var(--gold)';
    } else if(ready>t){
      st.className='ab-st c'; st.textContent='Cooldown '+Math.ceil((ready-t)/1000)+'s';
      const total=p.cd*1000*cdMult(); const left=ready-t;
      fill.style.width=(100*(1-left/total)).toFixed(1)+'%'; fill.style.background='var(--violet)';
    } else {
      d.classList.add('ready'); st.className='ab-st r'; st.textContent='READY · tap to use';
      fill.style.width='0%';
    }
  });
}

/* THREATS panel */
let threatSig='';
function renderThreats(){
  el.threatSub.textContent = S.villains+' defeated';
  const th=S.threat;
  const id = th? (th.major?('boss'+th.idx):('minor'+(th.spawnAt||0))) : ('none'+S.storyIndex);
  if(id!==threatSig || th){ // boss/minor: rebuild structure on change; always refresh hp via update below
    if(threatSig!==id){
      threatSig=id;
      if(!th){
        const nb = S.storyIndex<BOSSES.length? BOSSES[S.storyIndex]:null;
        let html='<div class="card boss"><div class="bem">🛰️</div>'+
          '<div class="bnm" style="color:#cfe0ff">Scanning…</div>'+
          '<div class="bstory">The streets are calm. Stay ready — the next threat is never far off.</div>';
        if(nb){ html+='<div class="bkind major" style="margin-top:6px">Next major threat</div>'+
          `<div class="bstory" style="font-style:normal">⚠️ <b style="color:#ffd0d6">${nb.name}</b> ${nb.emoji} — appears at <b style="color:var(--gold)">${fmt(nb.unlock)}</b> Valor earned.</div>`; }
        else { html+='<div class="bkind major" style="margin-top:6px">All major villains defeated 🌟</div>'; }
        html+='</div>';
        el.threatBody.innerHTML=html;
      } else {
        el.threatBody.innerHTML='<div class="card boss">'+
          `<div class="bem">${th.emoji}</div>`+
          `<div class="bkind ${th.major?'major':'minor'}">${th.major?'★ Major Villain':'Crime Wave'}</div>`+
          `<div class="bnm">${th.name}</div>`+
          (th.intro?`<div class="bstory">${th.intro}</div>`:'')+
          '<div class="bhp"><div class="bhpfill" id="bhpfill"></div><div class="bhptxt" id="bhptxt"></div></div>'+
          '<div class="dps">Your team deals <b id="dpsLine">0</b>/s automatically</div>'+
          '<button class="strike" id="strikeBtn">⚡ STRIKE</button>'+
          '<div class="brew" id="brewLine"></div>'+
          '</div>';
        const sb=$('#strikeBtn'); if(sb) sb.addEventListener('click',strikeThreat);
      }
    }
  }
  // live update hp
  if(th){
    const fill=$('#bhpfill'), txt=$('#bhptxt'), dl=$('#dpsLine'), br=$('#brewLine');
    if(fill){ fill.style.width=clamp(100*th.hp/th.max,0,100)+'%'; }
    if(txt){ txt.textContent=fmt(Math.max(0,th.hp))+' / '+fmt(th.max)+' HP'; }
    if(dl){ dl.textContent=fmt(production()); }
    if(br){ const sec=th.rewardSec||0; br.innerHTML='Reward: <b>'+fmt(threatReward(th))+'</b> Valor'+(th.major?' · permanent +'+Math.round(th.perma*100)+'% production':''); }
  }
}
function threatReward(th){
  const sec=th.rewardSec||0;
  return Math.max(th.major?500:25, production()*sec)*threatRewardMult();
}
function strikeThreat(){
  if(!S.threat) return;
  const dmg=clickPower()*strikeMult()*3;   // strike hits for 3× a tap
  damageThreat(dmg, true);
}
function damageThreat(dmg, fromTap){
  const th=S.threat; if(!th) return;
  th.hp-=dmg;
  if(fromTap){ const sb=$('#strikeBtn'); if(sb){ sb.style.transform='scale(.94)'; setTimeout(()=>sb&&(sb.style.transform=''),70);} }
  if(th.hp<=0) defeatThreat();
}
function defeatThreat(){
  const th=S.threat; if(!th) return;
  const reward=threatReward(th);
  gainValor(reward);
  S.villains++;
  if(th.major){
    S.permaBonus=(S.permaBonus||0)+th.perma;
    if(th.idx===S.storyIndex) S.storyIndex++;
    S.threat=null; S.threatCD=6;
    fxBurst();
    refreshTabHints();
    modal(`<div class="mhead"><div class="me">${th.emoji}</div><div class="mt red">${th.name} Defeated!</div></div>`+
      `<div class="mbody"><p>${th.win}</p><p style="margin-top:10px">Reward: <span class="big">+${fmt(reward)}</span> Valor</p>`+
      `<p style="margin-top:6px;color:var(--aqua)">Permanent bonus: <b style="color:var(--aqua)">+${Math.round(th.perma*100)}% production</b> 🛡️</p></div>`+
      `<div class="mfoot"><button class="btn go" onclick="closeModal()">Claim victory</button></div>`);
    toast('Villain defeated!', th.name+' is finished. +'+fmt(reward)+' Valor', 'win', '🏆');
  } else {
    S.threat=null; S.threatCD=22;
    toast('Crime stopped', th.name+' foiled. +'+fmt(reward)+' Valor', 'win', '👮');
  }
  threatSig=''; checkAch(); save();
}
function spawnThreat(){
  if(S.threat) return;
  // major boss?
  if(S.storyIndex<BOSSES.length && S.lifetime>=BOSSES[S.storyIndex].unlock){
    const b=BOSSES[S.storyIndex];
    S.threat={major:true, idx:S.storyIndex, name:b.name, emoji:b.emoji, hp:b.hp, max:b.hp,
      perma:b.perma, rewardSec:b.reward, intro:b.intro, win:b.win, spawnAt:now()};
    toast('⚠️ A villain appears!', b.name+' '+b.emoji+' is attacking the city.', 'warn', '🚨');
    refreshTabHints();
    return;
  }
  // minor crime wave (only once threats tab unlocked)
  if(!tabUnlocked('threats')) return;
  const prod=production();
  const hp=Math.max(40, prod*9);
  const names=['Smash Mob','Neon Bandits','The Pickpockets','Joyride Gang','Blackout Crew','Static Thugs','The Lurkers'];
  S.threat={major:false, name:names[Math.floor(Math.random()*names.length)], emoji:'🎯',
    hp:hp, max:hp, rewardSec:38, intro:'A wave of street crime sweeps the district.', spawnAt:now()};
  refreshTabHints();
}

  // skill tree (after first prestige)
  if(S.prestiges>=1 || S.legend>0){

  } else {

      const can=!have && reqOk && S.legend>=k.cost;
      const node=document.createElement('button');
      node.className='sknode '+(have?'have':can?'afford':(!reqOk?'lock':''));
      let costHtml = have? '✓ owned' : (k.cost+' ⭐');
      let reqNote = (!have&&!reqOk)? `<div class="sds" style="color:var(--red)">Requires: ${SKMAP[k.req].name}</div>`:'';
      node.innerHTML=`<div class="se">${k.emoji}</div><div class="smid"><div class="snm">${k.name}</div>`+
        `<div class="sds">${k.desc}</div>${reqNote}</div>`+
        `<div class="scost ${have?'owned':can?'':'no'}">${costHtml}</div>`;
      if(can) node.addEventListener('click',()=>buySkill(k.id));
      sw.appendChild(node);
    });
  }
}

/* ---------------- actions ---------------- */
function gainValor(n){ S.v+=n; S.earned+=n; S.lifetime+=n; }
function buyGen(id,row){
  const g=GMAP[id]; const owned=S.gens[id]||0;
  let amt = S.buyAmt===-1 ? genMaxAffordable(g,owned,S.v) : S.buyAmt;
  if(amt<1) return;
  const cost=genCostTotal(g,owned,amt);
  if(S.v<cost) return;
  S.v-=cost; S.gens[id]=owned+amt;
  flash(row);
  checkUnlocks(); checkAch(); save();
}
function buyUpgrade(id,row){
  const u=UMAP[id]; if(S.ups[id]) return;
  if(S.v<u.cost) return;
  S.v-=u.cost; S.ups[id]=true;
  flash(row);
  upgSig=''; // force upgrade list rebuild (item removed)
  buildPowers();
  checkAch(); save();
  if(u.type==='global') toast('Upgrade bought', u.name+' — production boosted.', '', u.emoji);
}
function castPower(id){
  const p=PMAP[id]; const t=now();
  if((S.pow[id]||0)>t) return;             // cooling down
  if((S.powActive[id]||0)>t) return;       // already active
  S._usedPower=true;
  if(p.kind==='burst'){
    const amt=production()*p.sec;
    gainValor(amt);
    toast(p.name+'!', '+'+fmt(amt)+' Valor banked instantly.', 'win', p.emoji);
  } else {
    S.powActive[id]=t+p.dur*1000;
    toast(p.name+'!', p.desc, '', p.emoji);
  }
  S.pow[id]=t + p.cd*1000*cdMult();
  checkAch(); save();
}
function buySkill(id){
  const k=SKMAP[id]; if(S.ups[id]) return;
  if(k.req && !S.ups[k.req]) return;
  if(S.legend<k.cost) return;
  S.legend-=k.cost; S.ups[id]=true;
  buildPowers(); renderLegacy(); checkAch(); save();
  toast('Mastery unlocked', k.name, 'win', k.emoji);
}

function fxBurst(){

/* ---------------- game loop + offline ---------------- */
let teamSig='', powSig='', legacySig='';
let lastTick=now(), lastSave=now(), hiddenAt=now(), autoBuyTimer=0, chkTimer=0;

function unlockedGenCount(){ let n=0; for(const g of GENS){ if(S.lifetime>=g.unlock||(S.gens[g.id]||0)>0) n++; } return n; }

function awardOffline(sec){
  const cap=offlineCapHours()*3600;
  const eff=Math.min(Math.max(0,sec),cap);
  const prod=production();
  const gain=prod*eff;
  if(gain>0){ S.v+=gain; S.earned+=gain; S.lifetime+=gain; }
  return {gain, eff, capped:sec>cap};
}
function autoBuyCheapest(){
  let best=null,bestCost=Infinity;
  for(const g of GENS){
    const owned=S.gens[g.id]||0;
    if(!(S.lifetime>=g.unlock||owned>0)) continue;
    const cost=genCostTotal(g,owned,1);
    if(cost<=S.v && cost<bestCost){ best=g; bestCost=cost; }
  }
  if(best){ const owned=S.gens[best.id]||0; S.v-=bestCost; S.gens[best.id]=owned+1; }
}
function autoCastPowers(){
  const t=now();
  for(const p of POWERS){
    if(S.lifetime<p.unlock) continue;
    if((S.pow[p.id]||0)>t || (S.powActive[p.id]||0)>t) continue;
    S._usedPower=true;
    if(p.kind==='burst'){ const amt=production()*p.sec; S.v+=amt; S.earned+=amt; S.lifetime+=amt; }
    else { S.powActive[p.id]=t+p.dur*1000; }
    S.pow[p.id]=t+p.cd*1000*cdMult();
  }
}
function loop(){
  const t=now(); let dt=(t-lastTick)/1000; lastTick=t;
  if(dt<0) dt=0; if(dt>1) dt=1;
  const prod=production();
  if(prod>0){ const g=prod*dt; S.v+=g; S.earned+=g; S.lifetime+=g; }
  if(S.threat){ if(prod>0) damageThreat(prod*dt,false); }
  else { S.threatCD-=dt; if(S.threatCD<=0){ spawnThreat(); if(!S.threat) S.threatCD=8; } }
  if(hasFlag('sk_autoteam')){ autoBuyTimer-=dt; if(autoBuyTimer<=0){ autoBuyTimer=2.5; autoBuyCheapest(); } }
  if(hasFlag('sk_autopow')) autoCastPowers();
  chkTimer-=dt; if(chkTimer<=0){ chkTimer=1; checkUnlocks(); checkAch(); }
  renderHUD(); renderActive();
  if(t-lastSave>8000){ lastSave=t; save(); }
  requestAnimationFrame(loop);
}
function renderActive(){
  if(curTab==='team'){
    const ts=unlockedGenCount()+'|'+S.buyAmt;
    if(ts!==teamSig){ teamSig=ts; buildTeamRows(); }
    updateTeamRows();
  } else if(curTab==='powers'){
    const ps=''+POWERS.filter(p=>S.lifetime>=p.unlock).length;
    if(ps!==powSig){ powSig=ps; buildPowers(); }
    updateAbilities(); renderUpgrades();
  } else if(curTab==='threats'){
    renderThreats();
  } else if(curTab==='legacy'){
    const ls=S.prestiges+'|'+Math.floor(S.legend)+'|'+SKILLS.filter(k=>S.ups[k.id]).length+'|'+(canPrestige()?1:0);
    if(ls!==legacySig){ legacySig=ls; renderLegacy(); }
    else { const pb=$('#prestigeBtn'); if(pb){ const g=legendGain(); pb.classList.toggle('dis',g<=0); pb.textContent='RETIRE · +'+fmt(g)+' ⭐'; } }
  }
}

}

  window.addEventListener('blur',save);
  document.addEventListener('freeze',save);
}

if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',init);
else init();
</script>
